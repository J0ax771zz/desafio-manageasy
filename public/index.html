<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Agenda de Contatos - Manageasy</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>

  <body class="bg-light">
    <nav class="navbar bg-primary shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand text-light fw-bold" href="#"
          ><i class="bi bi-layers-half"></i> Manageasy</a
        >
      </div>
    </nav>

    <div class="container mt-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Agenda de Contatos</h2>
        <button class="btn btn-primary" id="btn-novo-contato">
          <i class="bi bi-plus-lg"></i> Novo Contato
        </button>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <div class="input-group">
            <input
              type="text"
              id="filtro-busca"
              class="form-control"
              placeholder="Pesquisar por nome ou e-mail..."
            />
            <button class="btn btn-primary" id="btn-buscar">Buscar</button>
            <button class="btn btn-outline-secondary" id="btn-limpar">
              Limpar
            </button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped table-hover">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Nome</th>
                  <th>Email</th>
                  <th>Telefone</th>
                  <th>Nascimento</th>
                  <th>Cadastro</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tabela-contatos">
                <!--Todos os contatos vem aqui atráves do JQuery-->
              </tbody>
            </table>
          </div>
          <nav>
            <ul class="pagination justify-content-center" id="paginacao"></ul>
          </nav>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalContato" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="form-contato">
            <div class="modal-header bg-primary text-white">
              <h5 class="modal-title" id="modalTitulo">Novo Contato</h5>
              <button
                type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="contato-id" />
              <div class="mb-3">
                <label class="form-label">Nome Completo</label>
                <input type="text" class="form-control" id="nome" required />
              </div>
              <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" required />
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Telefone</label>
                  <input
                    type="number"
                    maxlength="15"
                    class="form-control"
                    id="telefone"
                  />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Nascimento</label>
                  <input
                    type="date"
                    class="form-control"
                    id="data_nascimento"
                    required
                  />
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-light border"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <button type="submit" class="btn btn-primary" id="btn-salvar">
                Salvar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toastNotificacao" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastMensagem"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
  </body>
</html>
